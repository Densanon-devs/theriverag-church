name: Build content from _data

on:
  push:
    branches: [main]
    paths:
      - '_data/**'
      - 'scripts/build_pages.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run build_pages.py
        run: python scripts/build_pages.py

      - name: Commit if changed
        run: |
          git config user.name 'theriverag-bot'
          git config user.email 'noreply@theriverag.church'
          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            git commit -m "build: substitute content from _data [skip ci]"
            git push
          else
            echo "no changes"
          fi
