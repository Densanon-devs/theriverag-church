<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The River Church — Signing you in…</title>
  <meta name="robots" content="noindex">
  <style>
    body { margin: 0; padding: 2rem; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 720px; }
    .ok { color: #486; }
    .err { color: #a33; }
    .dim { color: #666; font-size: 0.85rem; }
    pre { background: #f3f0e6; padding: 10px 14px; border-radius: 4px; overflow: auto; white-space: pre-wrap; }
    button { padding: 0.4rem 1rem; font-size: 0.9rem; cursor: pointer; }
  </style>
</head>
<body>
  <h2 id="msg">Finishing sign-in…</h2>
  <p class="dim">If the main Decap tab doesn't load by itself, you can close this window manually.</p>
  <pre id="debug">Working…</pre>
  <button id="closebtn">Close this window</button>
  <script>
    // Same-origin handoff for the Decap OAuth popup. The Worker redirected
    // us here with the access token in the URL fragment.
    //
    // Communication channels (we use all three for resilience):
    //   1. localStorage + storage event — durable, fires even if the
    //      listener attached after the write.
    //   2. BroadcastChannel — same-origin pub/sub.
    //   3. window.opener.postMessage — works in browsers where the
    //      cross-origin redirect didn't sever opener.
    (function () {
      var msgEl   = document.getElementById('msg');
      var dbgEl   = document.getElementById('debug');
      var closeBtn = document.getElementById('closebtn');
      closeBtn.onclick = function () { window.close(); };

      var lines = [];
      function log(line) {
        lines.push(line);
        dbgEl.textContent = lines.join('\n');
        try { console.log('[oauth-callback]', line); } catch (_) {}
      }

      log('callback page loaded at ' + window.location.origin + window.location.pathname);
      var hash = (window.location.hash || '').replace(/^#/, '');
      var params = new URLSearchParams(hash);
      var token = params.get('access_token');
      var error = params.get('error');

      log('fragment has access_token: ' + (token ? 'yes (gho_…' + token.slice(-6) + ')' : 'no'));
      log('window.opener: ' + (window.opener ? 'present' : 'null (severed)'));

      if (error) {
        msgEl.className = 'err';
        msgEl.textContent = 'OAuth error: ' + error;
        return;
      }
      if (!token) {
        msgEl.className = 'err';
        msgEl.textContent = 'No access_token in URL fragment.';
        return;
      }

      var payload = {
        token: token,
        provider: 'github',
        ts: Date.now()
      };
      var msg = 'authorization:github:success:' + JSON.stringify({
        token: token,
        provider: 'github'
      });

      // Channel 1: localStorage. The Decap window's `storage` listener
      // will fire when this key changes (it's only fired on OTHER same-
      // origin windows, which is exactly what we want).
      try {
        localStorage.setItem('decap-oauth-handoff', JSON.stringify(payload));
        log('wrote to localStorage["decap-oauth-handoff"]');
      } catch (e) {
        log('localStorage write FAILED: ' + (e && e.message));
      }

      // Channel 2: BroadcastChannel.
      try {
        var bc = new BroadcastChannel('decap-oauth');
        bc.postMessage(msg);
        log('posted on BroadcastChannel "decap-oauth"');
      } catch (e) {
        log('BroadcastChannel FAILED: ' + (e && e.message));
      }

      // Channel 3: window.opener.postMessage (best-effort).
      if (window.opener && !window.opener.closed) {
        try {
          window.opener.postMessage(msg, window.location.origin);
          log('posted via window.opener.postMessage');
        } catch (e) {
          log('opener.postMessage FAILED: ' + (e && e.message));
        }
      } else {
        log('skipped opener.postMessage (no opener)');
      }

      msgEl.className = 'ok';
      msgEl.textContent = 'Signed in! Click the button below or close this window when the main tab loads.';
      log('done — close this window once the main /admin/ tab loads.');
    })();
  </script>
</body>
</html>
