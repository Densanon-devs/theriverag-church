<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>The River Church — Admin</title>
  <link rel="icon" type="image/x-icon" href="../site/images/favicon.ico">
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #nc-root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="nc-root"></div>
  <script>
    // ── Diagnostic catch-all ──────────────────────────────────────────
    window.addEventListener('message', function (e) {
      var preview = typeof e.data === 'string'
        ? e.data.slice(0, 100)
        : '<' + (typeof e.data) + '>';
      console.log('[MSG]', e.origin, '/', preview, 'source=' + (e.source === window ? 'self' : e.source ? 'other-window' : 'null'));
    });

    // ── Direct hydration bypass ───────────────────────────────────────
    // Decap's own auth listener is receiving the postMessage but not
    // dispatching the login state for reasons we couldn't pin down. So
    // we grab the token ourselves, fetch the GitHub user, drop it into
    // every localStorage key Decap might use, and reload — Decap should
    // rehydrate to a logged-in state on next boot.
    var hydrated = false;
    window.addEventListener('message', async function (e) {
      if (hydrated) return;
      if (typeof e.data !== 'string') return;
      var m = e.data.match(/^authorization:github:success:(.+)$/);
      if (!m) return;
      hydrated = true;  // guard against the popup's 3 retries triggering 3 reloads

      console.log('[hydrate] caught auth message, bypassing Decap auth flow');
      var payload;
      try { payload = JSON.parse(m[1]); }
      catch (err) { console.error('[hydrate] bad JSON:', err); return; }
      if (!payload.token) { console.error('[hydrate] no token in payload'); return; }

      try {
        var r = await fetch('https://api.github.com/user', {
          headers: { Authorization: 'token ' + payload.token, 'Accept': 'application/vnd.github+json' }
        });
        console.log('[hydrate] GitHub /user status:', r.status);
        if (!r.ok) {
          var body = await r.text();
          console.error('[hydrate] /user failed body:', body.slice(0, 200));
          alert('GitHub user fetch failed (' + r.status + '). Check console.');
          return;
        }
        var ghUser = await r.json();
        console.log('[hydrate] got user:', ghUser.login);

        var user = {
          backendName: 'github',
          token: payload.token,
          login: ghUser.login,
          name: ghUser.name || ghUser.login,
          email: ghUser.email || '',
          avatar_url: ghUser.avatar_url || '',
          useOpenAuthoring: false,
        };
        var userJson = JSON.stringify(user);

        // Try every key Decap / Netlify CMS have used historically.
        var keys = ['decap-cms-user', 'netlify-cms-user', 'nf-cms-user'];
        for (var i = 0; i < keys.length; i++) {
          try { localStorage.setItem(keys[i], userJson); } catch (_) {}
        }
        console.log('[hydrate] wrote user to', keys.join(', '), '— reloading in 500ms');
        setTimeout(function () { window.location.reload(); }, 500);
      } catch (err) {
        console.error('[hydrate] failed:', err);
        alert('Hydration failed — see console.');
      }
    });
  </script>

  <script>
    // OAuth bridge — runs BEFORE the Decap bundle so listeners are up
    // by the time oauth-callback.html hands the token over.
    //
    // Chrome's origin-keyed agent clusters null out window.opener after
    // the cross-origin hop through github.com, so Decap's built-in
    // postMessage handshake (popup → opener) doesn't fire. We listen
    // on two same-origin channels — localStorage and BroadcastChannel —
    // and forward the token to Decap as a synthetic MessageEvent.
    (function () {
      // Decap's auth listener silently drops messages whose origin doesn't
      // match its configured base_url. Keep this in sync with config.yml.
      var OAUTH_BASE_URL = 'https://decao-oauth.media-a75.workers.dev';

      function forward(msg) {
        if (typeof msg !== 'string') return;
        if (msg.indexOf('authorization:github') !== 0) return;
        console.log('[decap-bridge] forwarding to Decap');
        window.dispatchEvent(new MessageEvent('message', {
          data: msg,
          origin: OAUTH_BASE_URL,
          source: window,
        }));
      }

      // Channel 1: localStorage. Most durable — fires even if the listener
      // attached after the write, on a poll of the storage key.
      var STORAGE_KEY = 'decap-oauth-handoff';
      function checkStorage() {
        var raw = null;
        try { raw = localStorage.getItem(STORAGE_KEY); } catch (e) { return; }
        if (!raw) return;
        try {
          var payload = JSON.parse(raw);
          if (!payload || !payload.token) return;
          if (payload.ts && Date.now() - payload.ts > 120000) {
            localStorage.removeItem(STORAGE_KEY);
            return;
          }
          localStorage.removeItem(STORAGE_KEY);
          var msg = 'authorization:github:success:' + JSON.stringify({
            token: payload.token, provider: 'github'
          });
          forward(msg);
        } catch (e) { /* malformed — ignore */ }
      }
      // Poll once on load (in case popup wrote BEFORE this script ran),
      // then on every storage event (cross-window writes by the popup).
      checkStorage();
      window.addEventListener('storage', function (e) {
        if (e.key === STORAGE_KEY) checkStorage();
      });

      // Channel 2: BroadcastChannel.
      try {
        var bc = new BroadcastChannel('decap-oauth');
        bc.addEventListener('message', function (e) { forward(e.data); });
      } catch (err) {
        console.warn('[decap-bridge] BroadcastChannel unavailable:', err);
      }
    })();
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Decap reads /admin/config.yml automatically and mounts its UI.
  </script>
</body>
</html>
