# Decap CMS configuration for theriverag.church
# Volunteers log in here, edit content via a Squarespace-style UI, and save.
# Saved changes commit to GitHub; GitHub Pages rebuilds and the site updates.

backend:
  name: github
  repo: densanon-devs/theriverag-church
  branch: main
  # OAuth gateway for github.com login. The Worker source lives at
  # oauth-worker/index.js in this repo; deployed to Cloudflare at the URL
  # below. See docs/CMS_SETUP.md for the full setup.
  base_url: https://decao-oauth.media-a75.workers.dev
  auth_endpoint: auth

# editorial_workflow turns every save into a draft Pull Request that an admin
# approves. Switch to "simple" if you want saves to publish instantly.
publish_mode: editorial_workflow

# Where uploaded images go in the repo and how they're referenced by URL.
# Aligned with the church-ops admin's /api/website/upload destination so
# both editors drop images into the same folder.
media_folder: site/images/uploaded
public_folder: /site/images/uploaded

site_url: https://theriverag.church
display_url: https://theriverag.church
logo_url: https://theriverag.church/site/images/logo.png

collections:
  # ─────────────────────────────────────────────────────────────────────
  # Site-wide editable text — single file, everyone can tweak these
  # ─────────────────────────────────────────────────────────────────────
  - name: site_settings
    label: Site Settings
    description: Text that shows on every page (announcement bar, footer, etc.)
    files:
      - file: _data/site.yml
        name: site
        label: Site-wide Settings
        fields:
          - { label: "Announcement Bar Text", name: announcement_text, widget: string,
              hint: "Shows in the gold bar at the very top of every page" }
          - { label: "Hero Tagline", name: hero_tagline, widget: text,
              hint: "The paragraph below 'YOU BELONG HERE!' on the home page" }
          - { label: "Footer Tagline", name: footer_tagline, widget: text,
              hint: "Short sentence under the logo in the footer" }
          - { label: "Phone Number", name: phone, widget: string }
          - { label: "Contact Email", name: email, widget: string }
          - { label: "Address Line 1", name: address_line_1, widget: string }
          - { label: "Address Line 2", name: address_line_2, widget: string }
          - { label: "Facebook URL", name: facebook_url, widget: string }
          - { label: "Instagram URL", name: instagram_url, widget: string }
          - { label: "YouTube URL", name: youtube_url, widget: string }

  # ─────────────────────────────────────────────────────────────────────
  # Service times — easy to update when the schedule changes
  # ─────────────────────────────────────────────────────────────────────
  - name: services
    label: Service Times
    description: The 3 cards on the home page that show service schedule.
    files:
      - file: _data/services.yml
        name: services
        label: Service Times
        fields:
          - label: "Service Cards"
            name: cards
            widget: list
            min: 1
            max: 6
            fields:
              - { label: "Card Heading", name: heading, widget: string,
                  hint: "e.g. 'Sunday Services 9:30 & 11am'" }
              - { label: "Time / When", name: when, widget: string,
                  hint: "e.g. 'Sundays @ 9:30 & 11:00 AM'" }
              - { label: "Description", name: description, widget: text }

  # ─────────────────────────────────────────────────────────────────────
  # Pastors / leadership bio — about page
  # ─────────────────────────────────────────────────────────────────────
  - name: leadership
    label: About — Leadership
    files:
      - file: _data/leadership.yml
        name: leadership
        label: Pastors Bio
        fields:
          - { label: "Section Heading", name: heading, widget: string,
              hint: "e.g. 'Pastors Steve & Tracey Karst'" }
          - { label: "Photo", name: photo, widget: image,
              hint: "Pastors family photo" }
          - { label: "Bio Paragraphs", name: paragraphs, widget: list, field: { label: Paragraph, name: text, widget: text } }

  # ─────────────────────────────────────────────────────────────────────
  # Blog posts / announcements — volunteers can add new ones via the +New button
  # ─────────────────────────────────────────────────────────────────────
  - name: blog
    label: Announcements & Blog
    description: Add a new announcement or blog post.
    folder: content/blog
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Publish Date", name: date, widget: datetime }
      - { label: "Featured Image", name: image, widget: image, required: false }
      - { label: "Summary", name: summary, widget: text,
          hint: "1-2 sentences shown in the announcements list" }
      - { label: "Body", name: body, widget: markdown }
      - { label: "Author", name: author, widget: string, required: false }

  # ─────────────────────────────────────────────────────────────────────
  # Gallery photos — easy swap-in for hero / homepage galleries
  # ─────────────────────────────────────────────────────────────────────
  - name: gallery
    label: Photo Galleries
    files:
      - file: _data/gallery.yml
        name: gallery
        label: Homepage Galleries
        fields:
          - label: "Hero Image"
            name: hero
            widget: image
            hint: "Big image behind 'YOU BELONG HERE!'"
          - label: "Gallery Strip 1 (top)"
            name: strip_1
            widget: list
            min: 3
            max: 3
            field: { label: Photo, name: photo, widget: image }
          - label: "Gallery Strip 2 (below invitation)"
            name: strip_2
            widget: list
            min: 3
            max: 3
            field: { label: Photo, name: photo, widget: image }
