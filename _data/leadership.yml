# Pastors bio shown on the About page.
heading: "Pastors Steve & Tracey Karst"
photo: "/site/images/pastors-steve-tracey.jpg"
paragraphs:
  - "Pastors Steve and Tracey came to The River in February 2023. Originally from Wallace, Idaho Steve is a passionate visionary with a heart for the people of North Idaho. His goal at The River is to lead people into a loving and life-giving relationship with Jesus Christ by building servant leaders, reaching the lost, and helping others discover and fulfill the call of God on their lives."
  - "Steve and Tracey have a heart for adoption and foster care ministries. They have four adopted children at home — Gabriel, Moriah, Israel, and Ezekiel — and hope to continue to foster and adopt for the rest of their lives."
  - "Since Steve and Tracey have four children, they have no spare time, but when they do you will find them watching the Dallas Cowboys win, playing board games with their family, smoking ribs, and dreaming of visiting Galaxy's Edge at Disneyland."
