# Statement of beliefs shown on the About page.
# Each item is a short summary card. The full statement lives on ag.org.

heading: "About Our Beliefs"
intro: "The River Church is part of the Assemblies of God fellowship. Our doctrine follows the AG Statement of Fundamental Truths."
full_statement_label: "Read the Full Statement at AG.org"

items:
  - heading: "The One True God"
    description: "One God, eternally existing in three persons: Father, Son, and Holy Spirit."
  - heading: "The Fall of Man"
    description: "Humanity, created good, fell through voluntary transgression, resulting in separation from God."
  - heading: "The Deity of the Lord Jesus Christ"
    description: "Jesus Christ is the eternal Son of God — virgin born, sinless, crucified, risen, and exalted."
  - heading: "The Blessed Hope"
    description: "The resurrection of believers and the imminent return of the Lord."
  - heading: "The Salvation of Man"
    description: "Salvation is by grace, through faith in the shed blood of Jesus Christ."
  - heading: "Sanctification"
    description: "An ongoing work of separation from sin and conformity to Christ by the Holy Spirit."
  - heading: "The Scriptures Inspired"
    description: "The Bible is the inspired, infallible, and authoritative Word of God."
  - heading: "The Baptism of the Holy Spirit"
    description: "A gift available to every believer, empowering us for life and witness."
  - heading: "The Church and its Mission"
    description: "The Church exists to evangelize the world, worship God, disciple believers, and serve in love."
  - heading: "Divine Healing"
    description: "Healing is provided in the atonement and is the privilege of every believer."
  - heading: "The Ordinances of the Church"
    description: "Water baptism by immersion and the Lord's Supper, as commanded by Scripture."
  - heading: "The Initial Physical Evidence"
    description: "Speaking in other tongues is the initial physical evidence of the baptism in the Holy Spirit."
  - heading: "The Ministry"
    description: "A scripturally ordained ministry called to evangelize, worship, build, and serve."
  - heading: "The Millennial Reign of Christ"
    description: "Christ's visible return and reign on earth for one thousand years."
  - heading: "The Final Judgement"
    description: "A final judgment of the wicked dead, with eternal consequences."
  - heading: "The New Heaven and the New Earth"
    description: "A new heaven and a new earth where righteousness dwells."
