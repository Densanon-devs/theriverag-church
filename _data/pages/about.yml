# About page tree. Reorder, add, or remove sections via the admin
# visual editor; build_pages.py regenerates about/index.html on push.
meta:
  title: "About — The River Church"
  description: "Meet Pastors Steve and Tracey Karst, learn about our kids and youth ministries, and read what we believe at The River Church in Post Falls, Idaho."
  nav_label: About
  show_in_nav: true
  nav_order: 20
  slug: about

blocks:
  - type: leadership_section
    animation: { type: fade-up, duration: 700 }
    heading: About Our Leadership
    image: /site/images/pastors-steve-tracey.jpg
    image_focal: { x: 50, y: 30 }   # face-level crop on phones
    image_alt: Pastors Steve and Tracey Karst with family
    paragraphs:
      - "Pastors Steve and Tracey came to The River in February 2023. Originally from Wallace, Idaho Steve is a passionate visionary with a heart for the people of North Idaho. Beginning his career in management helped to hone his leadership gifting. His goal at The River is to lead people into a loving and life-giving relationship with Jesus Christ by building servant leaders, reaching the lost, and helping others discover and fulfill the call of God on their lives."
      - "Steve and Tracey have a heart for adoption and foster care ministries. They have four adopted children at home — Gabriel, Moriah, Israel, and Ezekiel — and hope to continue to foster and adopt for the rest of their lives."
      - "Since Steve and Tracey have four children, they have no spare time, but when they do you will find them watching the Dallas Cowboys win, playing board games with their family, smoking ribs, and dreaming of visiting Galaxy's Edge at Disneyland."

  - type: ministry_card
    animation: { type: fade-up, duration: 700 }
    heading: About Our Kids Ministry
    image: /site/images/river-kids.jpg
    image_alt: River Kids ministry
    description: "We believe that children are a treasure from the Lord. Here at The River Church, we want your kids to be safe, make friends, and have fun. We aim to take every opportunity to interact with and teach children about Jesus. Leaders lead by example and show the abundant love of Jesus."
    when: Sundays @ 9:30 & 11:00 AM
    reverse: true

  - type: ministry_card
    animation: { type: fade-up, duration: 700 }
    heading: About Our Youth Ministry
    image: /site/images/youth/youth-service-time.png
    image_alt: River Youth — Wednesdays at 6:30 PM
    description: "We believe in the importance of reaching the next generation for Christ and raising them up in the way they should go through fellowship and mentorship. At River Youth, we are doing exactly that every Wednesdays @ 6:30 pm. Join us for a time of learning, fun, and fellowship!"
    when: Wednesdays @ 6:30 PM

  - type: wave_divider

  - type: beliefs_grid
    animation: { type: fade-up, duration: 800 }
    heading: About Our Beliefs
    intro: "The River Church is part of the Assemblies of God fellowship. Our doctrine follows the AG Statement of Fundamental Truths."
    items:
      - { heading: "The One True God", description: "One God, eternally existing in three persons: Father, Son, and Holy Spirit." }
      - { heading: "The Fall of Man", description: "Humanity, created good, fell through voluntary transgression, resulting in separation from God." }
      - { heading: "The Deity of the Lord Jesus Christ", description: "Jesus Christ is the eternal Son of God — virgin born, sinless, crucified, risen, and exalted." }
      - { heading: "The Blessed Hope", description: "The resurrection of believers and the imminent return of the Lord." }
      - { heading: "The Salvation of Man", description: "Salvation is by grace, through faith in the shed blood of Jesus Christ." }
      - { heading: "Sanctification", description: "An ongoing work of separation from sin and conformity to Christ by the Holy Spirit." }
      - { heading: "The Scriptures Inspired", description: "The Bible is the inspired, infallible, and authoritative Word of God." }
      - { heading: "The Baptism of the Holy Spirit", description: "A gift available to every believer, empowering us for life and witness." }
      - { heading: "The Church and its Mission", description: "The Church exists to evangelize the world, worship God, disciple believers, and serve in love." }
      - { heading: "Divine Healing", description: "Healing is provided in the atonement and is the privilege of every believer." }
      - { heading: "The Ordinances of the Church", description: "Water baptism by immersion and the Lord's Supper, as commanded by Scripture." }
      - { heading: "The Initial Physical Evidence", description: "Speaking in other tongues is the initial physical evidence of the baptism in the Holy Spirit." }
      - { heading: "The Ministry", description: "A scripturally ordained ministry called to evangelize, worship, build, and serve." }
      - { heading: "The Millennial Reign of Christ", description: "Christ's visible return and reign on earth for one thousand years." }
      - { heading: "The Final Judgement", description: "A final judgment of the wicked dead, with eternal consequences." }
      - { heading: "The New Heaven and the New Earth", description: "A new heaven and a new earth where righteousness dwells." }
    full_statement_label: Read the Full Statement at AG.org
    full_statement_url: https://ag.org/Beliefs/Statement-of-Fundamental-Truths

  - type: tagline
    heading: You Belong Here!
    theme: dark
